name: Deploy MkDocs to Subfolder
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: pip install mkdocs-material

      - name: Build MkDocs
        run: |
          mkdocs build --site-dir ../Deucalion

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Deucalion
          destination_dir: Deucalion # This puts it in /Deucalion/
          keep_files: true           # CRITICAL: Prevents deleting your main index.html